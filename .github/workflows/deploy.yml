name: CI/CD — Build, Push & Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build et Push les images Docker
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et Push image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          dockerfile: ./back/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lr16cnstn02-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build et Push image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          dockerfile: ./front/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lr16cnstn02-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2 : Déploiement via SSH sur le serveur
  # ─────────────────────────────────────────
  deploy:
    name: Deploy sur serveur Linux
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/lr16cnstn02

            echo ">>> Téléchargement des nouvelles images..."
            docker compose -f docker-compose.prod.yml pull

            echo ">>> Redémarrage des containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo ">>> Nettoyage des anciennes images..."
            docker image prune -f

            echo ">>> Statut final :"
            docker compose -f docker-compose.prod.yml ps
