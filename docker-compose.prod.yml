services:
  db:
    image: mysql:8.0
    container_name: lr16cnstn02_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: lr16cnstn02_db
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ramzi85/lr16cnstn02-backend:latest
    container_name: lr16cnstn02_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/lr16cnstn02_db
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      APP_NAME: ${APP_NAME:-Plateforme LR16CNSTN02}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NODE_ENV: production
    volumes:
      - storage_data:/app/storage
    expose:
      - "4000"

  frontend:
    image: ramzi85/lr16cnstn02-frontend:latest
    container_name: lr16cnstn02_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  db_data:
  storage_data:
